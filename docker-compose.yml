name: atlascommerce

services:
  postgres:
    image: postgres:16
    container_name: atlas-postgres
    environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
    ports:
        - "5432:5432"
    volumes:
        - postgres_data:/var/lib/postgresql/data
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U atlas"]
        interval: 10s
        timeout: 5s
        retries: 5

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: atlas-mssql
    environment:
        ACCEPT_EULA: "Y"
        SA_PASSWORD: ${MSSQL_SA_PASSWORD}
        MSSQL_PID: "Developer"
    ports:
        - "1433:1433"
    volumes:
        - mssql_data:/var/opt/mssql
    healthcheck:
        test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"AtlasPass123!\" -C -Q 'SELECT 1' || exit 1"]
        interval: 10s
        timeout: 5s
        retries: 5

  mongo:
    image: mongo:7
    container_name: atlas-mongo
    environment:
        MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
        MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
    - "27017:27017"
    volumes:
    - mongo_data:/data/db 
    healthcheck:
        test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
        interval: 10s
        timeout: 5s
        retries: 5

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    ports:
        - "6379:6379"
    volumes:
        - redis_data:/data 
    healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: atlas-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"   
      - "15672:15672" 
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: atlas-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data

  minio:
    image: minio/minio:latest
    container_name: atlas-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"  
      - "9001:9001" 
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: atlas-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:9.0.0
    container_name: atlas-kibana
    environment:
     - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
     - "5601:5601"
    depends_on:
     - elasticsearch

  seq:
    image: datalust/seq:latest
    container_name: atlas-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
    ports:
      - "8081:80"     
      - "5341:5341"   
    volumes:
      - seq_data:/data
  
volumes:
  postgres_data:
  mssql_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
  keycloak_data:
  minio_data:
  elasticsearch_data:
  seq_data:
      